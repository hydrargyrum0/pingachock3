# Production stack for the shared Debian server: everything containerized
# so it doesn't touch whatever else runs on the box. Only Caddy is exposed
# to the host, and only on 30031 (real traffic) - port 80 is deliberately
# NOT published here because port 80 belongs to another site on this
# server. Certs are issued/renewed manually with docker-compose.renew.yml,
# see scripts/renew-cert.sh and README. Postgres and backend are reachable
# only inside the compose network.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pingachock
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: pingachock
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pingachock"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://pingachock:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/pingachock?sslmode=disable
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set in .env}
      LISTEN_ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  bot:
    build: ./bot
    restart: unless-stopped
    environment:
      telegram_bot_token: ${TELEGRAM_BOT_TOKEN:?set in .env}
      telegram_bot_admin_id: ${TELEGRAM_BOT_ADMIN_ID:?set in .env}
      DB_PATH: /app/data/users.db
      SETTINGS_DB_PATH: /app/data/settings.db
    volumes:
      - bot_data:/app/data
    depends_on:
      - backend
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "30031:30031" # real public traffic, pingachock.rapeer.com - no port 80 here, see above
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  bot_data:
